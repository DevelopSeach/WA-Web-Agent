<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>WA Web Agent Settings</title>
  <style>
    body{font-family:Arial,sans-serif;padding:24px;max-width:760px}label{display:block;margin-top:16px;font-weight:bold}input{width:100%;padding:10px;margin-top:6px;box-sizing:border-box}.inline{width:auto}button{margin-top:18px;padding:10px 18px;cursor:pointer}#status{margin-top:16px;color:green}
  </style>
</head>
<body>
  <h1>WA Web Agent Settings</h1>
  <label>Webhook URL</label><input id="webhookUrl" />
  <label>Command URL</label><input id="commandUrl" />
  <label>Command Result URL</label><input id="commandResultUrl" />
  <label>API Token</label><input id="apiToken" />
  <label><input id="enabled" class="inline" type="checkbox" /> פעיל</label>
  <label><input id="pollCommands" class="inline" type="checkbox" /> למשוך פקודות מהשרת</label>
  <button id="save">שמירה</button>
  <div id="status"></div>
  <script src="options.js"></script>
</body>
</html>
